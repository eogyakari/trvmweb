# Decap CMS Configuration — The Righteous Vine Missions
backend:
  name: git-gateway
  branch: main

media_folder: "images/uploads"
public_folder: "images/uploads"

editor:
  preview: false

collections:

  - name: "devotions"
    label: "📖 Devotions"
    label_singular: "Devotion"
    folder: "_content/devotions"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} ({{tag}})"
    fields:
      - {label: "Title",     name: "title",     widget: "string"}
      - {label: "Date",      name: "date",      widget: "datetime", date_format: "YYYY-MM-DD", time_format: false}
      - label: "Tag"
        name: "tag"
        widget: "select"
        options: [Faith, Prayer, Purpose, Healing, Words, Worship, Missions, Discipleship]
      - {label: "Scripture", name: "scripture", widget: "string",  required: false, hint: "e.g. Proverbs 18:21"}
      - {label: "Summary",   name: "summary",   widget: "text",    required: false, hint: "Short preview shown on cards"}
      - {label: "Content",   name: "body",      widget: "markdown"}
      - {label: "Published", name: "published", widget: "boolean", default: false}

  - name: "books"
    label: "📚 Books"
    label_singular: "Book"
    folder: "_content/books"
    create: true
    slug: "{{slug}}"
    summary: "{{title}} — {{author}}"
    fields:
      - {label: "Title",       name: "title",       widget: "string"}
      - {label: "Author",      name: "author",      widget: "string", default: "TRVM Ministry"}
      - {label: "Description", name: "description", widget: "text",   required: false}
      - label: "Category"
        name: "category"
        widget: "select"
        options: [Faith, Prayer, Missions, Discipleship, Healing, Leadership]
      - label: "Access"
        name: "access"
        widget: "select"
        options:
          - {label: "Free Download",            value: "free"}
          - {label: "Donation Required ($50+)", value: "donation"}
          - {label: "Coming Soon",              value: "coming"}
        default: "coming"
      - label: "Cover Colour"
        name: "cover_color"
        widget: "select"
        options:
          - {label: "Purple", value: "#4A1A7A"}
          - {label: "Green",  value: "#1A3C2A"}
          - {label: "Red",    value: "#5a0e00"}
          - {label: "Navy",   value: "#062040"}
          - {label: "Gold",   value: "#3a2800"}
        default: "#4A1A7A"
      - {label: "PDF File",    name: "pdf",         widget: "file",  required: false, media_folder: "files/books", public_folder: "files/books"}
      - {label: "Cover Image", name: "cover_image", widget: "image", required: false}
      - {label: "Published",   name: "published",   widget: "boolean", default: true}

  - name: "magazine"
    label: "📰 Vine Magazine"
    label_singular: "Magazine Issue"
    folder: "_content/magazine"
    create: true
    slug: "edition-{{edition}}"
    summary: "Edition {{edition}} — {{year}}"
    fields:
      - {label: "Edition Number", name: "edition",     widget: "number", value_type: "int", min: 1}
      - {label: "Year",           name: "year",        widget: "number", value_type: "int"}
      - {label: "Title/Theme",    name: "title",       widget: "string", required: false}
      - {label: "Description",    name: "description", widget: "text",   required: false}
      - {label: "PDF File",       name: "pdf",         widget: "file",   required: false, media_folder: "files/magazine", public_folder: "files/magazine"}
      - {label: "Cover Image",    name: "cover_image", widget: "image",  required: false}
      - label: "Access"
        name: "access"
        widget: "select"
        options:
          - {label: "Donation Required ($50+)", value: "donation"}
          - {label: "Free Download",            value: "free"}
          - {label: "Coming Soon",              value: "coming"}
        default: "donation"
      - {label: "Published", name: "published", widget: "boolean", default: true}

  - name: "videos"
    label: "🎬 Videos"
    label_singular: "Video"
    folder: "_content/videos"
    create: true
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      - {label: "Title",              name: "title",       widget: "string"}
      - {label: "YouTube/Vimeo URL",  name: "url",         widget: "string", hint: "Paste the full YouTube or Vimeo URL"}
      - {label: "Description",        name: "description", widget: "text",   required: false}
      - label: "Category"
        name: "category"
        widget: "select"
        options: [Service Highlights, Mission Report, Testimony, Teaching, Crusade, Other]
      - {label: "Date",      name: "date",      widget: "datetime", date_format: "YYYY-MM-DD", time_format: false}
      - {label: "Published", name: "published", widget: "boolean",  default: true}

  - name: "newsletter"
    label: "✉️ Newsletter"
    label_singular: "Issue"
    folder: "_content/newsletter"
    create: true
    slug: "{{year}}-{{month}}-{{slug}}"
    summary: "{{title}}"
    fields:
      - {label: "Title",     name: "title",   widget: "string"}
      - {label: "Date",      name: "date",    widget: "datetime", date_format: "YYYY-MM-DD", time_format: false}
      - {label: "Summary",   name: "summary", widget: "text",    required: false}
      - {label: "Content",   name: "body",    widget: "markdown"}
      - {label: "Published", name: "published", widget: "boolean", default: true}

  - name: "settings"
    label: "⚙️ Site Settings"
    files:
      - label: "General"
        name: "general"
        file: "_content/settings/general.json"
        fields:
          - {label: "Site Title",       name: "site_title",   widget: "string", default: "The Righteous Vine Missions"}
          - {label: "Tagline",          name: "tagline",      widget: "string"}
          - {label: "Contact Email",    name: "email",        widget: "string", default: "eogyakari@gmail.com"}
          - {label: "Phone",            name: "phone",        widget: "string", required: false}
          - {label: "Paystack URL",     name: "paystack_url", widget: "string"}
          - {label: "Facebook URL",     name: "facebook",     widget: "string"}
          - {label: "Instagram Handle", name: "instagram",    widget: "string"}
          - {label: "TikTok Handle",    name: "tiktok",       widget: "string"}

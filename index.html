<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Content Manager — The Righteous Vine Missions</title>
  <!-- Decap CMS (formerly Netlify CMS) -->
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  <style>
    /* Loading screen while CMS initialises */
    #cms-loading {
      position: fixed; inset: 0;
      background: linear-gradient(135deg, #1a0a30, #2A0A4A);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999; color: #fff;
    }
    #cms-loading h2 { font-family: sans-serif; font-size: 1.2rem; font-weight: 600; margin-top: 1rem; color: rgba(255,255,255,0.85); }
    #cms-loading p  { font-family: sans-serif; font-size: 0.85rem; color: rgba(255,255,255,0.5); margin-top: 0.4rem; }
    .spinner { width: 40px; height: 40px; border: 3px solid rgba(212,160,23,0.2); border-top-color: #D4A017; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div id="cms-loading">
    <div class="spinner"></div>
    <h2>The Righteous Vine Missions</h2>
    <p>Loading Content Manager...</p>
  </div>
  <script>
    // Hide loading screen once CMS mounts
    document.addEventListener('DOMContentLoaded', function() {
      setTimeout(function() {
        var el = document.getElementById('cms-loading');
        if (el) el.style.display = 'none';
      }, 2000);
    });
  </script>
</body>
</html>

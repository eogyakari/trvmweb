<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Righteous Vine Missions</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:'DM Sans';margin:0;background:#f4f6f9}
header{background:#4A1A7A;color:#fff;padding:20px;text-align:center}
.container{padding:20px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:20px}
.card{background:#fff;padding:20px;border-radius:15px;box-shadow:0 10px 25px rgba(0,0,0,.08)}
.btn{background:#D4A017;padding:10px 20px;border:none;border-radius:25px;cursor:pointer}
h2{font-family:'Playfair Display'}
input{width:100%;padding:10px;margin:5px 0;border-radius:8px;border:1px solid #ccc}
</style>
</head>

<body>

<header>
<h1>Righteous Vine Missions Dashboard</h1>
</header>

<div class="container">

<div class="grid">
<div class="card">
<h3>Add Donation</h3>
<input id="amount" placeholder="Amount">
<button onclick="addDonation()" class="btn">Add</button>
</div>

<div class="card">
<h3>Total Donations</h3>
<h2 id="total">$0</h2>
</div>

<div class="card">
<h3>Total Donors</h3>
<h2 id="count">0</h2>
</div>
</div>

<div class="card">
<h2>Donation Analytics</h2>
<canvas id="chart"></canvas>
</div>

</div>

<script>
let donations = [];

function addDonation(){
  let val = parseFloat(document.getElementById('amount').value);
  if(!val) return;
  donations.push(val);
  updateUI();
}

function updateUI(){
  let total = donations.reduce((a,b)=>a+b,0);
  document.getElementById('total').innerText = "$"+total;
  document.getElementById('count').innerText = donations.length;

  renderChart();
}

let chart;
function renderChart(){
  const ctx = document.getElementById('chart').getContext('2d');

  if(chart) chart.destroy();

  chart = new Chart(ctx,{
    type:'bar',
    data:{
      labels: donations.map((_,i)=>"Donation "+(i+1)),
      datasets:[{
        label:'Donations',
        data: donations
      }]
    }
  });
}
</script>

</body>
</html>
